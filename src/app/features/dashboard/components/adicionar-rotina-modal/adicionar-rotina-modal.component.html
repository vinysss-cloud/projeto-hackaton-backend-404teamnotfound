<div class="modal-backdrop" (click)="onCancel()">
  <div class="adicionar-links" (click)="$event.stopPropagation()">
    <div class="modal-2-header">
      <div class="adicionar-rotinas">Adicionar Rotinas</div>
      <div class="close-btn" (click)="onCancel()">✕</div>
    </div>
    <div class="frame-61">
      <div class="frame-60">
        <div class="frame-64">
          <div class="preencha-as-informa-es">
            Preencha as informações para salvar as informações em seu ambiente.
          </div>
          
          <form [formGroup]="rotinaForm" class="frame-43" (ngSubmit)="onSave()">
            
            <div class="frame-78">
              <div class="frame-77">
                <img class="edit-note" src="/assets/edit-note0.svg" />
              </div>
              <div class="frame-40">
                <div class="nome-da-rotina">Nome da Rotina*</div>
                <input type="text" class="input-field" formControlName="titulo" placeholder="Ex.: SIAC — Abertura de Conta PF" />
              </div>
            </div>

            <div class="frame-41">
              <div class="link-ou-sistema">Link ou sistema *</div>
              <input type="text" class="input-field" formControlName="link" placeholder="https:// ou nome do sistema interno" />
            </div>

            <div class="frame-42">
              <div class="descri-o-e-ou-informa-es-importantes">Descrição e/ou informações importantes</div>
              <textarea class="textarea-field" formControlName="descricao" placeholder="Descrição, contexto de uso ou lembrete sobre este acesso..."></textarea>
            </div>

            <div class="modal-error" *ngIf="error">{{ error }}</div>
          </form>
        </div>
      </div>
      
      <div class="frame-65">
        <div class="frame-59">
          <button type="button" class="dsc-button" [disabled]="loading" (click)="onSave()">
            <div class="label">{{ loading ? 'Salvando...' : 'Salvar' }}</div>
          </button>
          <button type="button" class="dsc-button2" [disabled]="loading" (click)="onCancel()">
            <div class="label">Cancelar</div>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
