# CAIXA HUB / SICAS - Backend Quarkus
quarkus.http.port=8081
quarkus.http.root-path=/api

# CORS para frontend separado.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,http://127.0.0.1:3000
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-correlation-id,x-request-id

# Configuraçăo padrăo para SQL Server
quarkus.datasource.db-kind=mssql
quarkus.datasource.username=user404notfound
quarkus.datasource.password=TeamNotFound404@
quarkus.datasource.jdbc.url=jdbc:sqlserver://mssqlsrv-hackaton-sandbox.database.windows.net:1433;databaseName=db_404notfound;encrypt=false;trustServerCertificate=true
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# Swagger / OpenAPI
quarkus.swagger-ui.enabled=true
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.path=/q/openapi
quarkus.smallrye-openapi.info-title=CAIXA HUB Backend API
quarkus.smallrye-openapi.info-version=1.0.0

# Perfil SQL Server com dados hardcoded, sem depender de variĂ¡veis de ambiente.
# Ajuste host, porta, banco, usuĂ¡rio e senha conforme o ambiente que serĂ¡ usado na apresentaĂ§Ă£o.
# Uso: ./mvnw quarkus:dev -Dquarkus.profile=sqlserver
%sqlserver.quarkus.datasource.db-kind=mssql
%sqlserver.quarkus.datasource.username=${DB_USERNAME:user404notfound}
%sqlserver.quarkus.datasource.password=${DB_PASSWORD}
%sqlserver.quarkus.datasource.jdbc.url=jdbc:sqlserver://mssqlsrv-hackaton-sandbox.database.windows.net:1433;databaseName=db_404notfound;encrypt=false;trustServerCertificate=true
%sqlserver.quarkus.hibernate-orm.database.generation=none
# Para SQL Server, execute antes os scripts em database/sqlserver.
# Agora Flyway está ativado para SQL Server. Certifique-se de que os scripts em db/migration săo compatíveis com SQL Server.
%sqlserver.quarkus.flyway.migrate-at-start=true

# Logs estruturados de suporte e monitoramento
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %X{correlationId} %s%e%n
quarkus.log.category."br.caixa.gov.hackathon".level=INFO
