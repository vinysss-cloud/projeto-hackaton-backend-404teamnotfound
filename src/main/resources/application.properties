# CAIXA HUB / SICAS - Backend Quarkus
# Default local: H2 persistente.
# Para SQL Server, rode com: ./mvnw.cmd quarkus:dev -Dquarkus.profile=sqlserver

# --------------------
# HTTP / API
# --------------------
quarkus.http.port=${HTTP_PORT:8081}
quarkus.http.root-path=/api

# --------------------
# CORS para frontend separado
# --------------------
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,http://127.0.0.1:3000}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-correlation-id,x-request-id

# --------------------
# BANCO PADRAO LOCAL - H2
# --------------------
# Salvaguarda local persistente. Nao apaga nem recria o banco se a pasta ./data ja existir.
# IMPORTANTE:
# - DATABASE_TO_UPPER=false preserva nomes minusculos ja criados pelas migrations.
# - CASE_INSENSITIVE_IDENTIFIERS=TRUE evita erro "Table USUARIOS not found (candidates are: usuarios)"
#   quando Hibernate/H2 interpretam identificadores com diferenca de maiusculas/minusculas.
quarkus.datasource.db-kind=h2
quarkus.datasource.username=${H2_USERNAME:sa}
quarkus.datasource.password=${H2_PASSWORD:sa}
quarkus.datasource.jdbc.url=${H2_JDBC_URL:jdbc:h2:file:./data/caixa-hub;MODE=MSSQLServer;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE}

# Hibernate nao cria, nao recria, nao atualiza e nao valida schema.
# Quem controla o schema e o Flyway.
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.validate-in-dev-mode=false
quarkus.hibernate-orm.sql-load-script=no-file

# Flyway aplica apenas migrations novas.
# validate-on-migrate=false evita falha por checksum quando migrations foram ajustadas durante o hackathon
# e o banco H2 local ja existe. clean-disabled=true evita limpeza acidental.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration/h2
quarkus.flyway.clean-disabled=true
quarkus.flyway.validate-on-migrate=false

# --------------------
# PERFIL SQL SERVER
# --------------------
# Uso: ./mvnw.cmd quarkus:dev -Dquarkus.profile=sqlserver
%sqlserver.quarkus.datasource.db-kind=mssql
%sqlserver.quarkus.datasource.username=${DB_USERNAME:user404notfound}
%sqlserver.quarkus.datasource.password=${DB_PASSWORD:TeamNotFound404@}
%sqlserver.quarkus.datasource.jdbc.url=${DB_URL:jdbc:sqlserver://mssqlsrv-hackaton-sandbox.database.windows.net:1433;databaseName=db_404notfound;encrypt=false;trustServerCertificate=true}

%sqlserver.quarkus.hibernate-orm.database.default-schema=dbo
%sqlserver.quarkus.hibernate-orm.schema-management.strategy=none
%sqlserver.quarkus.hibernate-orm.validate-in-dev-mode=false
%sqlserver.quarkus.hibernate-orm.sql-load-script=no-file

%sqlserver.quarkus.flyway.migrate-at-start=true
%sqlserver.quarkus.flyway.locations=db/migration/sqlserver
%sqlserver.quarkus.flyway.clean-disabled=true
%sqlserver.quarkus.flyway.validate-on-migrate=false

# --------------------
# PERFIL DE TESTE - H2 EM MEMORIA
# --------------------
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:caixa-hub-test;MODE=MSSQLServer;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=none
%test.quarkus.hibernate-orm.validate-in-dev-mode=false
%test.quarkus.hibernate-orm.sql-load-script=no-file
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.locations=db/migration/h2
%test.quarkus.flyway.clean-disabled=true
%test.quarkus.flyway.validate-on-migrate=false

# --------------------
# Swagger / OpenAPI
# --------------------
quarkus.swagger-ui.enabled=true
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.path=/q/openapi
quarkus.smallrye-openapi.info-title=CAIXA HUB Backend API
quarkus.smallrye-openapi.info-version=1.0.0

# --------------------
# Logs estruturados
# --------------------
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %X{correlationId} %s%e%n
quarkus.log.category."br.caixa.gov.hackathon".level=INFO
